<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Post History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body class="bg-slate-900 min-h-screen flex flex-col text-slate-100">

<div th:replace="blocks/header :: header"></div>

<main class="flex-1 px-4 py-10">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-xl font-semibold text-slate-100 mb-6">Post History</h1>

        <div th:if="${posts == null or #lists.isEmpty(posts)}"
             class="text-slate-500 text-sm py-8 text-center">
            No posts yet.
        </div>

        <div th:if="${posts != null and not #lists.isEmpty(posts)}"
             class="overflow-x-auto rounded-xl border border-slate-600 shadow-xl shadow-slate-950/60">
            <table class="w-full text-sm text-left">
                <thead class="bg-slate-600 text-xs uppercase tracking-wide text-slate-200">
                    <tr>
                        <th class="px-4 py-3 w-36 font-semibold">Date</th>
                        <th class="px-4 py-3 font-semibold">Post</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="post, stat : ${posts}"
                        th:class="${stat.odd} ? 'bg-slate-700 border-t border-slate-600' : 'bg-[#293548] border-t border-slate-600'">
                        <td class="px-4 py-3 text-slate-400 whitespace-nowrap" th:text="${post[0]}">date</td>
                        <td class="px-4 py-3 text-slate-100" th:text="${post[1]}">text</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

</body>
</html>
