<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Delete Post</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body class="bg-slate-900 min-h-screen flex flex-col text-slate-100">

<div th:replace="blocks/header :: header"></div>

<main class="flex-1 flex items-start justify-center px-4 py-12">
    <div class="w-full max-w-2xl bg-slate-800 rounded-xl shadow-xl border border-slate-700 p-8">
        <h1 class="text-xl font-semibold text-slate-100 mb-6">Delete Post</h1>

        <form method="post" action="/delete" aria-label="Delete a post">
            <label class="block text-sm text-slate-400 mb-1" for="text">Post text to delete</label>
            <input class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500"
                   id="text" name="post_text" maxlength="400" spellcheck="false"
                   placeholder="Enter the exact post text to remove" required>
            <div class="mt-4 flex justify-end">
                <button type="submit"
                        class="bg-red-700 hover:bg-red-600 text-white font-semibold py-2 px-6 rounded-lg transition-colors">
                    Delete
                </button>
            </div>
        </form>

        <div th:if="${deleteAttempted}" class="mt-6">
            <div th:if="${#bools.isTrue(deleted)}"
                 class="bg-green-950 border border-green-700 text-green-300 text-sm px-4 py-3 rounded-lg"
                 role="status">
                Post deleted successfully.
            </div>
            <div th:unless="${#bools.isTrue(deleted)}"
                 class="bg-yellow-950 border border-yellow-700 text-yellow-300 text-sm px-4 py-3 rounded-lg"
                 role="status">
                No matching post found in history.
            </div>
        </div>
    </div>
</main>

</body>
</html>
