<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Post</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body class="bg-slate-900 min-h-screen flex flex-col text-slate-100">

<div th:replace="blocks/header :: header"></div>

<main class="flex-1 flex items-start justify-center px-4 py-12">
    <div class="w-full max-w-2xl bg-slate-800 rounded-xl shadow-xl border border-slate-700 p-8">
        <h1 class="text-xl font-semibold text-slate-100 mb-6">New Post</h1>
        <form method="post" action="/api" aria-label="Create a new post">
            <textarea class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500 resize-y"
                      id="text" name="post_text" rows="5" maxlength="400"
                      spellcheck="false" tabindex="1"
                      placeholder="Write your post here..."></textarea>
            <div class="mt-4 flex justify-end">
                <button type="submit"
                        class="bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2 px-6 rounded-lg transition-colors">
                    Post
                </button>
            </div>
        </form>
    </div>
</main>

</body>
</html>
