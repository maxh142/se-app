<div th:fragment="header">
    <header class="flex items-center justify-between px-6 py-3 bg-slate-800 border-b border-slate-700 shadow-lg">
        <nav class="flex gap-6">
            <a class="text-slate-300 hover:text-white text-sm font-medium transition-colors" href="/api?post_text=">Post</a>
            <a class="text-slate-300 hover:text-white text-sm font-medium transition-colors" href="/history">History</a>
            <a class="text-slate-300 hover:text-white text-sm font-medium transition-colors" href="/delete?post_text=">Delete</a>
        </nav>
        <div class="text-sm text-slate-400">
            <th:block th:if="${not #bools.isTrue(isLoggedIn)}">
                Not logged in.
                <a href="/login" class="text-blue-400 hover:text-blue-300 transition-colors">Log in</a>
                or use
                <a href="/login_local" class="text-blue-400 hover:text-blue-300 transition-colors">local DB</a>.
            </th:block>
            <th:block th:if="${#bools.isTrue(isLoggedIn)}">
                Logged in.
                <a href="/logout" class="text-blue-400 hover:text-blue-300 transition-colors">Log out</a>.
            </th:block>
        </div>
    </header>
</div>
