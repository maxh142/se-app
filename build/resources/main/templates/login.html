<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body class="bg-slate-900 min-h-screen flex flex-col text-slate-100">

<div th:replace="blocks/header :: header"></div>

<main class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-lg bg-slate-800 rounded-xl shadow-xl border border-slate-700 p-8">

        <th:block th:if="${not #bools.isTrue(isLoggedIn)}">
            <h1 class="text-xl font-semibold text-slate-100 mb-6">Connect to Database</h1>

            <div th:if="${#bools.isTrue(loginFailed)}"
                 class="mb-6 bg-red-950 border border-red-700 text-red-300 text-sm px-4 py-3 rounded-lg"
                 role="alert">
                Login failed. Check your credentials and try again.
            </div>

            <form method="post" action="/login" aria-label="Database login">

                <p class="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-3">Database Connection</p>

                <label class="block text-sm text-slate-400 mb-1" for="dbHost">Hostname / IP</label>
                <input class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500 mb-4"
                       id="dbHost" name="dbHost" maxlength="200" required>

                <label class="block text-sm text-slate-400 mb-1" for="dbDBName">Database Name</label>
                <input class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500 mb-4"
                       id="dbDBName" name="dbDBName" maxlength="200" required>

                <label class="block text-sm text-slate-400 mb-1" for="dbUser">Username</label>
                <input class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500 mb-4"
                       id="dbUser" name="dbUser" maxlength="200" required>

                <label class="block text-sm text-slate-400 mb-1" for="dbPass">Password</label>
                <input class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500 mb-6"
                       id="dbPass" name="dbPass" type="password" maxlength="200" required>

                <hr class="border-slate-700 mb-6">

                <p class="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-3">
                    SSH Tunnel
                    <span class="normal-case font-normal text-slate-600">(optional)</span>
                </p>

                <label class="block text-sm text-slate-400 mb-1" for="jumpHost">Jump Host</label>
                <input class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500 mb-4"
                       id="jumpHost" name="jumpHost" maxlength="200" placeholder="Leave blank if not using SSH">

                <label class="block text-sm text-slate-400 mb-1" for="jumpUser">Jump Username</label>
                <input class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500 mb-4"
                       id="jumpUser" name="jumpUser" maxlength="200">

                <label class="block text-sm text-slate-400 mb-1" for="jumpPass">Jump Password</label>
                <input class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500 mb-6"
                       id="jumpPass" name="jumpPass" type="password" maxlength="200">

                <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2 px-4 rounded-lg transition-colors">
                    Log In
                </button>
            </form>

            <p class="mt-4 text-sm text-center text-slate-500">
                Or connect to a
                <a href="/login_local" class="text-blue-400 hover:text-blue-300 transition-colors">local H2 database</a>.
            </p>
        </th:block>

        <th:block th:if="${#bools.isTrue(isLoggedIn)}">
            <h1 class="text-xl font-semibold text-slate-100 mb-4">Already Logged In</h1>
            <p class="text-slate-400 text-sm">
                You are already connected to a database.
                <a href="/" class="text-blue-400 hover:text-blue-300 transition-colors">Return to home</a>
                or
                <a href="/logout" class="text-blue-400 hover:text-blue-300 transition-colors">log out</a>.
            </p>
        </th:block>

    </div>
</main>

</body>
</html>
